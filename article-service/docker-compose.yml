version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hhuser
      POSTGRES_PASSWORD: hhpass
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  article1:
    build: .
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    expose:
      - "80"

  article2:
    build: .
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    expose:
      - "80"

  article3:
    build: .
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    expose:
      - "80"

  loadbalancer:
    image: nginx:latest
    ports:
      - "8080:80"      
    depends_on:
      - article1
      - article2
      - article3
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg-data: