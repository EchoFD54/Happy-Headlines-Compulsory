name: HappyHeadlines Full Delivery Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: dotnet build --configuration Release
      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release

  deliver-services:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Custom Services
        run: |
          D_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | xargs | tr '[:upper:]' '[:lower:]')
      
          echo "Starting builds for user: $D_USER"

          docker build -t $D_USER/article-service ./article-service
          docker push $D_USER/article-service

          docker build -t $D_USER/comment-service ./comment-service
          docker push $D_USER/comment-service

          docker build -t $D_USER/publisher-service ./publisher-service
          docker push $D_USER/publisher-service

          docker build -t $D_USER/profanity-service ./profanity-service
          docker push $D_USER/profanity-service