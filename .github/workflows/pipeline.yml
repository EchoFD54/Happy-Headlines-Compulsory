name: HappyHeadlines Full Delivery Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: dotnet build --configuration Release
      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release

  deliver-services:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Lowercase Docker User
        run: echo "DOCKER_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | xargs | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Custom Services
        run: |
          docker build -t ${{ env.DOCKER_USER }}/article-service ./article-service
          docker push ${{ env.DOCKER_USER }}/article-service

          docker build -t ${{ env.DOCKER_USER }}/comment-service ./comment-service
          docker push ${{ env.DOCKER_USER }}/comment-service

          docker build -t ${{ env.DOCKER_USER }}/publisher-service ./publisher-service
          docker push ${{ env.DOCKER_USER }}/publisher-service

          docker build -t ${{ env.DOCKER_USER }}/profanity-service ./profanity-service
          docker push ${{ env.DOCKER_USER }}/profanity-service