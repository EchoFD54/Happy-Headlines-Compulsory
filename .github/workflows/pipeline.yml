name: HappyHeadlines Full Delivery Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: dotnet build --configuration Release
      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release

  deliver-services:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Article Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/article-service ./article-service
          docker push ${{ secrets.DOCKER_USERNAME }}/article-service
          
      - name: Comment Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/comment-service ./comment-service
          docker push ${{ secrets.DOCKER_USERNAME }}/comment-service

      - name: Publisher Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/publisher-service ./publisher-service
          docker push ${{ secrets.DOCKER_USERNAME }}/publisher-service

      - name: Profanity Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/profanity-service ./profanity-service
          docker push ${{ secrets.DOCKER_USERNAME }}/profanity-service